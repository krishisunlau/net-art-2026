<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>4</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="timeline">

    <div class="event left" data-message="Who should you talk to? The girl sitting by herself or the popular kid who is running around?">
      <div class="bubble">First Day of School</div>
    </div>

    <div class="event right" data-message="Should you get rainbow colors like you want, or dark blue because your mom said so?">
      <div class="bubble">Getting Braces</div>
    </div>

    <div class="event left" data-message="Should you go with my friends or the band nerd who asked you last minute? Would your friends care?">
      <div class="bubble">High School Prom</div>
    </div>

    <div class="event right" data-message="Did you pick the right major? Do you know what you are going to do with life?">
      <div class="bubble">Graduating College</div>
    </div>

    <div class="event left" data-message="Are you happy in your career? Should you make the jump to a new job?">
      <div class="bubble">Switching Jobs</div>
    </div>

    <div class="event right" data-message="Are they the right one? Will you be happy? Is there someone else out there?">
      <div class="bubble">Getting Married</div>
    </div>

    <div class="event left" data-message="Can you do this? Are you prepared? ">
      <div class="bubble">Having a Kid</div>
    </div>

    <div class="event right" data-message="What do you want to leave behind? What will happen when you die?">
      <div class="bubble">Making a Will</div>
    </div>

  </div>

  <div id="messageBox"></div>

  <script src="js/script.js"></script>
</body>
</html>

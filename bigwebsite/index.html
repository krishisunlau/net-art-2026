<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scroll Faces</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="instrucion">
    <div class="inTitle">Scroll Quest</div>
    <img class="scrollImg" src="scroll.png">
    <div class="inText">Start: <span class="inSpan">Scroll RIGHT →</span></div>
  </div>


  <div class="box second">
    😊
    <span class="note">Now scroll DOWN ↓</span>
  </div>

  <div class="box third">
    ☹️
    <span class="note">Now scroll LEFT ←</span>
  </div>

  <div class="box fourth">
    😍
    <span class="note">Now scroll UP ↑</span>
  </div>

</body>
</html>
